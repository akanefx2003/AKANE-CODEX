<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AKANE CODEX</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0A0C10" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AKANE CODEX" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <span class="brand-icon">▶</span>
      <h1>AKANE <span class="accent">CODEX</span></h1>
      <span class="cursor">_<span class="blink">|</span></span>
    </div>
    <button id="historyBtn" class="ghost-btn">🕐 <span id="historyCount"></span></button>
  </header>

  <main class="main">
    <div class="prompt-box">
      <div class="prompt-label">▸ DÉCRIS CE QUE LE CODE DOIT FAIRE</div>
      <textarea id="promptInput" rows="3" placeholder="ex: une commande WhatsApp qui bannit un membre du groupe..."></textarea>
      <div class="prompt-controls">
        <select id="langSelect"></select>
        <button id="generateBtn" class="primary-btn">GÉNÉRER ▸</button>
      </div>
    </div>

    <div id="errorBox" class="error-box hidden"></div>

    <div id="resultBox" class="result-box hidden">
      <div class="result-header">
        <span class="dot">●</span>
        <span id="resultFilename" class="filename"></span>
        <span id="resultLang" class="lang"></span>
        <div class="result-actions">
          <button id="copyBtn" class="ghost-btn small">📋 Copier</button>
          <button id="downloadBtn" class="ghost-btn small">⬇ Sauver</button>
        </div>
      </div>
      <pre id="codeOutput" class="code-output"></pre>
      <div id="explanationBox" class="explanation"></div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="empty-icon">▶_</div>
      <p>En attente d'instructions.</p>
      <p class="dim">Tous les langages. Un seul prompt.</p>
    </div>

    <button id="installBtn" class="install-btn hidden">📲 Installer AKANE CODEX</button>

    <footer class="footer">© AKANE CODEX 🌹</footer>
  </main>

  <div id="historyDrawer" class="drawer hidden">
    <div class="drawer-panel">
      <div class="drawer-header">
        <span>HISTORIQUE</span>
        <button id="closeHistory" class="ghost-btn small">✕</button>
      </div>
      <div id="historyList" class="drawer-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
